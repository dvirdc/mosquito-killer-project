<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1119"/>
      <stop offset="1" stop-color="#0b0d11"/>
    </linearGradient>
    <radialGradient id="glowG" cx="0.8" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#3dff7a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#3dff7a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.05" cy="0.95" r="0.7">
      <stop offset="0" stop-color="#6db8ff" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#6db8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cone" x1="1080" y1="580" x2="720" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3dff7a" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#3dff7a" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="spot" cx="720" cy="250" r="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3dff7a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3dff7a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowG)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>
  <rect x="8" y="8" width="1184" height="614" rx="22" fill="none" stroke="#283041" stroke-width="2"/>

  <!-- laser cone from bottom-right emitter to the bug -->
  <polygon points="1082,577.8 747,220.5 693,279.5 1077.97,582.2" fill="url(#cone)"/>
  <line x1="1080" y1="580" x2="720" y2="250" stroke="#3dff7a" stroke-opacity="0.22" stroke-width="10" stroke-linecap="round"/>
  <line x1="1080" y1="580" x2="720" y2="250" stroke="#3dff7a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="1080" cy="580" r="6" fill="#3dff7a"/>

  <!-- landing spot + targeting ring -->
  <circle cx="720" cy="250" r="70" fill="url(#spot)"/>
  <circle cx="720" cy="250" r="48" fill="none" stroke="#3dff7a" stroke-width="3.5"/>
  <g stroke="#3dff7a" stroke-width="3">
    <line x1="720" y1="188" x2="720" y2="206"/>
    <line x1="720" y1="294" x2="720" y2="312"/>
    <line x1="658" y1="250" x2="676" y2="250"/>
    <line x1="764" y1="250" x2="782" y2="250"/>
  </g>

  <!-- the bug -->
  <g transform="translate(720,250) rotate(28)">
    <ellipse cx="-3" cy="-7" rx="13" ry="5" fill="#bcd4ff" opacity="0.35"/>
    <ellipse cx="-3" cy="7" rx="13" ry="5" fill="#bcd4ff" opacity="0.35"/>
    <g stroke="#11141a" stroke-width="1.6" opacity="0.85">
      <line x1="-2" y1="2" x2="-13" y2="13"/>
      <line x1="2" y1="2" x2="13" y2="13"/>
      <line x1="0" y1="2" x2="0" y2="16"/>
    </g>
    <ellipse cx="0" cy="0" rx="13" ry="5.5" fill="#0e0e12"/>
    <circle cx="11" cy="0" r="4" fill="#0e0e12"/>
  </g>

  <!-- wordmark + copy -->
  <text x="92" y="156" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700"
        letter-spacing="5" fill="#3dff7a">FOR-FUN CV SIMULATOR</text>

  <text x="88" y="280" font-family="Helvetica, Arial, sans-serif" font-size="98" font-weight="800" letter-spacing="-2">
    <tspan fill="#3dff7a">PewPew</tspan><tspan fill="#e6e9ef">Bug</tspan>
  </text>

  <text x="92" y="356" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="500" fill="#cfd5de">Your webcam hunts the mosquito.</text>
  <text x="92" y="404" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="500" fill="#cfd5de">You still do the swatting.</text>

  <rect x="92" y="470" width="300" height="52" rx="26" fill="#161a21" stroke="#283041" stroke-width="1.5"/>
  <circle cx="124" cy="496" r="6" fill="#3dff7a"/>
  <text x="144" y="504" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#98a0ad">pewpewbug.com</text>
</svg>
